name: E2E

# When the suite runs:
#   - On every PR targeting main (catches regressions before merge)
#   - On direct push to main (catches anything that slipped via
#     a no-PR push, and gives us a green-checkmark history)
#
# We intentionally do NOT run on pushes to feature branches
# without a PR open — those runs are noise that nobody reads.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A second push to the same PR cancels the previous run. Saves CI
# minutes and avoids merging while a stale run is in flight.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Supabase env vars are pulled from GitHub Secrets so a fork PR
    # doesn't get them (forks don't see secrets by default — that's
    # the right behavior; we'd rather a fork's E2E fail loudly than
    # leak prod credentials).
    #
    # If the secrets aren't set, the build still succeeds (lib/supabase.ts
    # falls back to placeholders), but auth-touching tests will fail.
    # The suite is designed so unauthenticated tests pass either way.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci --no-audit --no-fund

      # The Playwright browser binaries are big (~150 MB). We cache
      # them by the locked version of @playwright/test so we re-download
      # only when we bump Playwright itself, not on every run.
      - name: Get Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # If the browser was cached, we still need the OS-level deps
      # (libnss3 etc.) that --with-deps installs. They're cheap.
      - name: Install Playwright system deps (cached browser path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E suite
        run: npm run e2e

      # On failure, surface the HTML report + traces as artifacts so
      # we can debug the flake without re-running. The trace is the
      # killer feature — open it in `npx playwright show-trace` and
      # you get a step-by-step replay with DOM snapshots.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
